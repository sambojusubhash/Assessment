<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Personal Profile</h2>

        <div class="profile-box">
            
            <div class="image-box">
                <img src="D:\Website\Pic.jpeg" alt="Profile Image">
            </div>
            <form>
                <label>Name:</label>
                <input type="text" name="name">

                <label>Age:</label>
                <input type="number" name="age">

                <label>City:</label>
                <input type="text" name="city">

                <label>Gender:</label>
                <input type="text" name="Gender">

                <label>Projects:</label><br>
                <input type="radio" name="project"> Java<br>
                <input type="radio" name="project"> Python<br>
                <input type="radio" name="project"> AWS<br>
                <input type="radio" name="project"> Cybersecurity<br>

                <label>About You:</label>
                <textarea rows="5" placeholder="Write 5 lines...">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Aspernatur ipsum fugit repudiandae velit corporis quia magni eveniet ex aut explicabo ipsa officiis mollitia, nihil unde odio facilis maxime non reiciendis.</textarea>

            </form>

        </div>
    </div>

</body>
</html>
